llm:
  provider: "ollama"
  model: "llama3"
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 2048
  fallback:
    provider: "ollama"
    model: "llama3.2"
    base_url: "http://localhost:11434"
  gemini:
    model: "gemini-2.0-flash"
    api_key: ""

graph:
  backend: "networkx"
  # neo4j settings (used when backend: "neo4j")
  neo4j:
    uri: "bolt://localhost:7687"
    username: "neo4j"
    password: ""

simulation:
  max_agents: 50
  time_steps: 100
  tick_interval_seconds: 1.0
  seed: 42

logging:
  level: "INFO"
  file: "logs/simulation.log"
