experiment:
  name: "Quick Test"
  description: "Fast validation run with minimal agents"

domain:
  name: "quick_test"
  belief_dimensions: ["opinion"]
  confidence_bound: 0.4
  stubbornness: 0.2
  convergence_rate: 0.3
  interaction_mode: "deffuant"

agents:
  count: 4
  persona_source: "minimal"
  initial_beliefs:
    distribution: "uniform"
    range: [0.1, 0.9]
  activity_rate: 1.0

seed:
  entities: []

topology:
  type: "full_mesh"

simulation:
  max_ticks: 3
  snapshot_every: 1
  seed: 42

detection:
  thresholds: {}

llm:
  provider: "ollama"
  model: "qwen2.5"
  base_url: "http://localhost:8080/v1"
  temperature: 0.7
  max_tokens: 256
  max_turns: 2

logging:
  level: "verbose"

graph:
  backend: "networkx"
