experiment:
  name: "Propaganda Quick - Counterfactual"
  description: "What-if analysis on the quick propaganda test"

counterfactual:
  source_experiment: "configs/experiments/propaganda_quick.yaml"
  source_log: "logs/propaganda_quick.jsonl"
  divergence_threshold: 0.02
  scenarios:
    - name: "remove_propaganda"
      rewind_to_tick: 2
      interventions:
        - type: "remove_agent"
          target: "Agent_0"

    - name: "boost_propaganda"
      rewind_to_tick: 2
      interventions:
        - type: "modify_belief"
          target: "Agent_3"
          vector: [0.95]
        - type: "modify_property"
          target: "Agent_3"
          key: "stubbornness"
          value: 0.9

simulation:
  max_ticks: 5

llm:
  provider: "ollama"
  model: "qwen2.5"
  base_url: "http://localhost:8080/v1"
  temperature: 0.7
  max_tokens: 256
  max_turns: 2

graph:
  backend: "networkx"
